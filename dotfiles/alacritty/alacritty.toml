[window]
padding        = { x = 14, y = 10 }
decorations    = "none"
opacity        = 0.92
startup_mode   = "Windowed"

[scrolling]
history        = 5000

[font]
normal         = { family = "JetBrainsMono Nerd Font", style = "Regular" }
bold           = { family = "JetBrainsMono Nerd Font", style = "Bold" }
italic         = { family = "JetBrainsMono Nerd Font", style = "Italic" }
size           = 11.0

[colors.primary]
background     = "#1e1e2e"
foreground     = "#cdd6f4"
dim_foreground = "#7f849c"

[colors.cursor]
cursor         = "#f5e0dc"
text           = "#1e1e2e"

[colors.selection]
background     = "#313244"
text           = "CellForeground"

[colors.normal]
black          = "#45475a"
red            = "#f38ba8"
green          = "#a6e3a1"
yellow         = "#f9e2af"
blue           = "#89b4fa"
magenta        = "#f5c2e7"
cyan           = "#94e2d5"
white          = "#bac2de"

[colors.bright]
black          = "#585b70"
red            = "#f38ba8"
green          = "#a6e3a1"
yellow         = "#f9e2af"
blue           = "#89b4fa"
magenta        = "#f5c2e7"
cyan           = "#94e2d5"
white          = "#a6adc8"

[cursor]
style          = { shape = "Block", blinking = "On" }
blink_interval = 500

[keyboard]
bindings = [
  { key = "V",      mods = "Control|Shift", action = "Paste"           },
  { key = "C",      mods = "Control|Shift", action = "Copy"            },
  { key = "Return", mods = "Control|Shift", action = "SpawnNewInstance" },
]
