# chimera-rice picom config

backend          = "glx";
glx-no-stencil   = true;
glx-copy-from-front = false;
use-damage       = true;

shadow           = true;
shadow-radius    = 12;
shadow-offset-x  = -8;
shadow-offset-y  = -8;
shadow-opacity   = 0.5;
shadow-exclude   = [
  "name = 'Notification'",
  "class_g = 'Conky'",
  "class_g ?= 'Notify-osd'",
  "_GTK_FRAME_EXTENTS@:c",
  "class_g = 'Polybar'",
];

fading           = true;
fade-in-step     = 0.03;
fade-out-step    = 0.03;
fade-delta       = 4;
fade-exclude     = [];

active-opacity   = 1.0;
inactive-opacity = 0.92;
frame-opacity    = 1.0;
inactive-opacity-override = false;

opacity-rule = [
  "100:class_g = 'feh'",
  "100:class_g = 'mpv'",
  "100:fullscreen",
];

blur-background  = true;
blur-method      = "dual_kawase";
blur-strength    = 6;
blur-background-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "_GTK_FRAME_EXTENTS@:c",
];

corner-radius    = 8;
rounded-corners-exclude = [
  "window_type = 'dock'",
  "class_g = 'Polybar'",
];

mark-wmwin-focused      = true;
mark-ovredir-focused    = false;
detect-rounded-corners  = true;
detect-client-opacity   = true;
detect-transient        = true;
detect-client-leader    = true;
log-level = "warn";
